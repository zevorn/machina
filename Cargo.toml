[workspace]
members = [
    "core",
    "accel",
    "guest/riscv",
    "decode",
    "disas",
    "tests",
    "tools/irdump",
    "tools/irbackend",
    "util",
    "memory",
    "monitor",
    "system",
    "hw/core",
    "hw/intc",
    "hw/char",
    "hw/riscv",
    "tests/mtest",
]
resolver = "2"

[package]
name = "machina"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "machina"
path = "src/main.rs"

[dependencies]
machina-core = { path = "core" }
machina-accel = { path = "accel" }
machina-memory = { path = "memory" }
machina-hw-riscv = { path = "hw/riscv" }
machina-system = { path = "system" }
