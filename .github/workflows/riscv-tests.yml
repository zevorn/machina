name: riscv-tests

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      riscv_tests_ref:
        description: "Optional riscv-tests ref or commit"
        required: false
        default: ""
        type: string

jobs:
  riscv-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RISCV_TESTS_REPO: https://github.com/riscv-software-src/riscv-tests.git
      RISCV_TESTS_DIR: ${{ runner.temp }}/riscv-tests
      RISCV_TESTS_REF: ${{ inputs.riscv_tests_ref }}
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout machina
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install riscv-tests cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ripgrep
          if apt-cache show gcc-riscv64-unknown-elf >/dev/null 2>&1 \
            && apt-cache show binutils-riscv64-unknown-elf >/dev/null 2>&1; then
            sudo apt-get install -y \
              binutils-riscv64-unknown-elf \
              gcc-riscv64-unknown-elf
            echo "RISCV_PREFIX=riscv64-unknown-elf-" >> "${GITHUB_ENV}"
          else
            sudo apt-get install -y \
              binutils-riscv64-linux-gnu \
              gcc-riscv64-linux-gnu
            echo "RISCV_PREFIX=riscv64-linux-gnu-" >> "${GITHUB_ENV}"
          fi

      - name: Clone riscv-tests
        run: |
          git clone --recursive "${RISCV_TESTS_REPO}" "${RISCV_TESTS_DIR}"
          if [ -n "${RISCV_TESTS_REF}" ]; then
            git -C "${RISCV_TESTS_DIR}" fetch --depth 1 origin "${RISCV_TESTS_REF}"
            git -C "${RISCV_TESTS_DIR}" checkout --detach FETCH_HEAD
            git -C "${RISCV_TESTS_DIR}" submodule update --init --recursive
          fi
          git -C "${RISCV_TESTS_DIR}" rev-parse HEAD

      - name: Build and run riscv-tests on machina
        run: |
          chmod +x ./scripts/run-riscv-tests.sh
          ./scripts/run-riscv-tests.sh

      - name: Publish summary
        if: always()
        run: |
          if [ -f target/riscv-tests/summary.txt ]; then
            cat target/riscv-tests/summary.txt >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload riscv-tests artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: riscv-tests-results
          path: |
            target/riscv-tests/pass.txt
            target/riscv-tests/fail.txt
            target/riscv-tests/timeout.txt
            target/riscv-tests/summary.txt
